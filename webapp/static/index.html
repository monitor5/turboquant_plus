<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurboQuant WebUI</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
/* ─── Reset & Variables ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0f1117;
  --bg-2:      #161b22;
  --bg-3:      #1c2128;
  --border:    #30363d;
  --text:      #e6edf3;
  --text-2:    #8b949e;
  --accent:    #58a6ff;
  --green:     #3fb950;
  --red:       #f85149;
  --yellow:    #d29922;
  --purple:    #a371f7;
  --sidebar-w: 260px;
}

html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* ─── Layout ────────────────────────────────────────────────── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ─── Sidebar ───────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg-2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-head {
  padding: 14px 12px 10px; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.logo { font-weight: 700; font-size: 15px; color: var(--accent); flex: 1; }
.logo span { color: var(--text-2); font-weight: 400; font-size: 12px; }
#new-chat-btn {
  background: var(--accent); color: #fff; border: none; border-radius: 6px;
  padding: 5px 10px; cursor: pointer; font-size: 13px; font-weight: 600;
}
#new-chat-btn:hover { opacity: 0.85; }

#conv-list { flex: 1; overflow-y: auto; padding: 8px 6px; }
.conv-item {
  padding: 8px 10px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  color: var(--text-2); font-size: 13px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  transition: background 0.1s;
}
.conv-item:hover { background: var(--bg-3); color: var(--text); }
.conv-item.active { background: var(--bg-3); color: var(--text); }
.conv-item .conv-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.conv-item .del-btn {
  opacity: 0; font-size: 12px; color: var(--red);
  background: none; border: none; cursor: pointer; padding: 0 2px;
}
.conv-item:hover .del-btn { opacity: 1; }

#sidebar-foot {
  padding: 10px 8px; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 4px;
}
.sidebar-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 6px; cursor: pointer;
  color: var(--text-2); font-size: 13px; border: none; background: none;
  width: 100%; text-align: left; transition: background 0.1s;
}
.sidebar-btn:hover { background: var(--bg-3); color: var(--text); }
.sidebar-btn.active { background: var(--bg-3); color: var(--accent); }

/* ─── Main ───────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ─── Top Bar ────────────────────────────────────────────────── */
#topbar {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  border-bottom: 1px solid var(--border); background: var(--bg-2);
  height: 52px; flex-shrink: 0;
}
#model-select {
  background: var(--bg-3); border: 1px solid var(--border); color: var(--text);
  padding: 5px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
}
#server-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--red);
  transition: background 0.3s; flex-shrink: 0;
}
#server-dot.up { background: var(--green); }
#server-url-label { font-size: 12px; color: var(--text-2); }
#gpu-bars { display: flex; gap: 8px; flex: 1; justify-content: flex-end; align-items: center; }
.gpu-mini {
  display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2);
}
.gpu-bar-wrap { width: 60px; height: 6px; background: var(--bg-3); border-radius: 3px; overflow: hidden; }
.gpu-bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.5s; }
.gpu-bar.hot { background: var(--red); }
.gpu-bar.warm { background: var(--yellow); }

/* ─── Messages ───────────────────────────────────────────────── */
#messages-wrap { flex: 1; overflow-y: auto; padding: 20px 0; }
#messages { max-width: 760px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 20px; }
.msg { display: flex; gap: 12px; }
.msg.user { flex-direction: row-reverse; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.msg.user .avatar { background: var(--accent); }
.msg.assistant .avatar { background: var(--purple); }
.msg-content {
  max-width: 85%; padding: 10px 14px; border-radius: 10px;
  line-height: 1.6; font-size: 14px;
}
.msg.user .msg-content { background: var(--bg-3); border: 1px solid var(--border); }
.msg.assistant .msg-content { background: transparent; }
.msg-content p { margin: 0 0 8px; } .msg-content p:last-child { margin: 0; }
.msg-content pre { margin: 8px 0; border-radius: 6px; overflow: auto; }
.msg-content code:not(pre code) {
  background: var(--bg-3); padding: 1px 5px; border-radius: 3px;
  font-size: 13px; color: var(--yellow);
}
.msg-content ul, .msg-content ol { padding-left: 20px; margin: 6px 0; }
.msg-content h1,.msg-content h2,.msg-content h3 { margin: 10px 0 6px; font-weight: 600; }

#typing-indicator { display: none; }
#typing-indicator.visible { display: flex; }
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--text-2);
  animation: blink 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.3s; }
.typing-dot:nth-child(3) { animation-delay: 0.6s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* ─── Input Area ─────────────────────────────────────────────── */
#input-area {
  padding: 12px 16px; border-top: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0;
}
#input-box {
  max-width: 760px; margin: 0 auto;
  display: flex; gap: 10px; align-items: flex-end;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
}
#user-input {
  flex: 1; background: none; border: none; outline: none; color: var(--text);
  font-size: 14px; resize: none; max-height: 180px; line-height: 1.5;
  font-family: inherit; min-height: 20px;
}
#user-input::placeholder { color: var(--text-2); }
#send-btn {
  background: var(--accent); color: #fff; border: none; border-radius: 6px;
  padding: 7px 14px; cursor: pointer; font-size: 13px; font-weight: 600;
  flex-shrink: 0; transition: opacity 0.1s;
}
#send-btn:hover { opacity: 0.85; }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ─── Panel Overlay ──────────────────────────────────────────── */
#panel-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50;
}
#panel-overlay.visible { display: block; }

#control-panel {
  display: none; position: fixed; top: 52px; right: 0; bottom: 0; width: 420px;
  background: var(--bg-2); border-left: 1px solid var(--border);
  overflow-y: auto; z-index: 51; flex-direction: column;
}
#control-panel.visible { display: flex; }

.panel-tabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ptab {
  flex: 1; padding: 12px 8px; text-align: center; cursor: pointer;
  font-size: 12px; color: var(--text-2); border-bottom: 2px solid transparent;
  transition: color 0.15s;
}
.ptab.active { color: var(--accent); border-bottom-color: var(--accent); }
.ptab:hover { color: var(--text); }

.panel-body { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.panel-section { display: none; flex-direction: column; gap: 12px; }
.panel-section.active { display: flex; }

.section-title {
  font-size: 12px; font-weight: 600; color: var(--text-2);
  text-transform: uppercase; letter-spacing: 0.5px;
}
label { font-size: 13px; color: var(--text-2); display: block; margin-bottom: 4px; }
input[type=text], input[type=number], select, textarea.cfg {
  width: 100%; background: var(--bg-3); border: 1px solid var(--border);
  color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 13px;
  font-family: inherit; outline: none;
}
input[type=text]:focus, input[type=number]:focus, select:focus, textarea.cfg:focus {
  border-color: var(--accent);
}
select option { background: var(--bg-3); }
textarea.cfg { resize: vertical; min-height: 60px; }

.btn-row { display: flex; gap: 8px; }
.btn {
  padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; transition: opacity 0.1s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-danger  { background: var(--red); color: #fff; }
.btn-success { background: var(--green); color: #000; }
.btn-neutral { background: var(--bg-3); color: var(--text); border: 1px solid var(--border); }

.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
}
.badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-red   { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-yellow{ background: rgba(210,153,34,0.15); color: var(--yellow); }

/* ─── Log Viewer ─────────────────────────────────────────────── */
.log-viewer {
  background: #0d1117; border: 1px solid var(--border); border-radius: 6px;
  font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px;
  line-height: 1.5; height: 200px; overflow-y: auto; padding: 8px 10px;
  color: #c9d1d9; white-space: pre-wrap; word-break: break-all;
}
.log-line-pass { color: var(--green); }
.log-line-fail { color: var(--red); }
.log-line-warn { color: var(--yellow); }

/* ─── GPU Detail ─────────────────────────────────────────────── */
.gpu-card {
  background: var(--bg-3); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px;
}
.gpu-name { font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.gpu-stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.gpu-stat-label { font-size: 11px; color: var(--text-2); }
.gpu-stat-val { font-size: 11px; color: var(--text); }
.progress-bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; margin-top: 3px; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.5s; }
.progress-fill.warm { background: var(--yellow); }
.progress-fill.hot  { background: var(--red); }

/* ─── Welcome screen ─────────────────────────────────────────── */
#welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 16px; color: var(--text-2); text-align: center; padding: 40px;
}
#welcome h2 { font-size: 22px; color: var(--text); }
#welcome p  { font-size: 14px; max-width: 400px; line-height: 1.6; }
.chip {
  display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px;
  border: 1px solid var(--border); color: var(--text-2); margin: 2px;
  cursor: pointer; transition: border-color 0.15s;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div id="app">

<!-- ═══ Sidebar ═══════════════════════════════════════════════ -->
<aside id="sidebar">
  <div id="sidebar-head">
    <span class="logo">TurboQuant <span>WebUI</span></span>
    <button id="new-chat-btn" title="새 대화">+</button>
  </div>

  <div id="conv-list"><!-- dynamic --></div>

  <div id="sidebar-foot">
    <button class="sidebar-btn" id="btn-server-panel">
      <span>⚡</span> 서버 제어
    </button>
    <button class="sidebar-btn" id="btn-tests-panel">
      <span>🧪</span> 테스트 &amp; 벤치
    </button>
    <button class="sidebar-btn" id="btn-settings-panel">
      <span>⚙</span> 설정
    </button>
  </div>
</aside>

<!-- ═══ Main ══════════════════════════════════════════════════ -->
<div id="main">
  <!-- Top bar -->
  <div id="topbar">
    <select id="model-select" title="활성 모델"></select>
    <div id="server-dot" title="LLM 서버 상태"></div>
    <span id="server-url-label"></span>
    <div id="gpu-bars"><!-- dynamic --></div>
  </div>

  <!-- Messages -->
  <div id="messages-wrap">
    <div id="messages">
      <div id="welcome">
        <h2>TurboQuant WebUI</h2>
        <p>PolarQuant + QJL KV 캐시 압축 기반 LLM 인터페이스</p>
        <div id="suggestion-chips">
          <span class="chip" onclick="fillPrompt('TurboQuant 알고리즘을 간단히 설명해줘')">TurboQuant란?</span>
          <span class="chip" onclick="fillPrompt('KV 캐시 압축의 장점을 설명해줘')">KV 캐시 압축 장점</span>
          <span class="chip" onclick="fillPrompt('turbo4 vs turbo3 차이점은?')">turbo4 vs turbo3</span>
        </div>
        <p id="welcome-server-hint" style="font-size:12px; color: var(--red);"></p>
      </div>
    </div>
    <div id="messages-bottom"></div>
  </div>

  <!-- Typing indicator -->
  <div id="typing-indicator" style="padding: 0 16px 8px; max-width:760px; margin:0 auto;">
    <div class="msg assistant" style="display:none" id="typing-row">
      <div class="avatar">🤖</div>
      <div style="display:flex; gap:4px; align-items:center; padding: 10px 0">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div id="input-box">
      <textarea id="user-input" rows="1" placeholder="메시지를 입력하세요…"></textarea>
      <button id="send-btn">전송</button>
    </div>
  </div>
</div><!-- /main -->

<!-- ═══ Control Panel (right drawer) ════════════════════════ -->
<div id="panel-overlay"></div>
<div id="control-panel">
  <div class="panel-tabs">
    <div class="ptab active" data-tab="server">⚡ 서버</div>
    <div class="ptab" data-tab="tests">🧪 테스트</div>
    <div class="ptab" data-tab="bench">📊 벤치</div>
    <div class="ptab" data-tab="gpu">🖥 GPU</div>
    <div class="ptab" data-tab="settings">⚙ 설정</div>
  </div>
  <div class="panel-body">

    <!-- Server tab -->
    <div class="panel-section active" id="tab-server">
      <div class="section-title">LLM 서버 관리</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="section-title">상태</span>
        <span id="server-status-badge" class="status-badge badge-red">● 오프라인</span>
      </div>

      <div>
        <label>모델 경로 (.gguf)</label>
        <input type="text" id="srv-model-path" placeholder="/path/to/model.gguf">
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <div>
          <label>캐시 타입</label>
          <select id="srv-cache-type">
            <option value="turbo4">turbo4</option>
            <option value="turbo3">turbo3</option>
            <option value="q8_0">q8_0</option>
            <option value="q4_0">q4_0</option>
            <option value="f16">f16</option>
          </select>
        </div>
        <div>
          <label>포트</label>
          <input type="number" id="srv-port" value="8080">
        </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <div>
          <label>컨텍스트 크기</label>
          <input type="number" id="srv-ctx" value="32768">
        </div>
        <div>
          <label>GPU 레이어 (NGL)</label>
          <input type="number" id="srv-ngl" value="999">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-success" id="srv-start-btn" onclick="serverStart()">▶ 시작</button>
        <button class="btn btn-danger"  id="srv-stop-btn"  onclick="serverStop()" disabled>■ 종료</button>
      </div>

      <div class="section-title" style="margin-top:4px;">서버 로그</div>
      <div class="log-viewer" id="log-server"></div>
    </div>

    <!-- Tests tab -->
    <div class="panel-section" id="tab-tests">
      <div class="section-title">테스트 러너</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span id="tests-status-badge" class="status-badge badge-yellow">● 대기</span>
      </div>
      <div>
        <label>모드</label>
        <select id="test-mode">
          <option value="quick">quick — 핵심 5개 파일 (~4초)</option>
          <option value="unit">unit  — 단위 테스트 전체</option>
          <option value="full">full  — 전체 (hw/niah 포함)</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="test-run-btn" onclick="testsRun()">▶ 실행</button>
      </div>
      <div class="log-viewer" id="log-tests"></div>
    </div>

    <!-- Bench tab -->
    <div class="panel-section" id="tab-bench">
      <div class="section-title">퀵 벤치마크</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span id="bench-status-badge" class="status-badge badge-yellow">● 대기</span>
      </div>
      <div>
        <label>모델 경로</label>
        <input type="text" id="bench-model-path" placeholder="/path/to/model.gguf">
      </div>
      <div>
        <label>llama.cpp 디렉토리</label>
        <input type="text" id="bench-llama-dir" placeholder="(기본값 사용)">
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" id="bench-no-ref" style="width:auto">
        <label for="bench-no-ref" style="margin:0">--no-ref (레퍼런스 없이 수치만 출력)</label>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="bench-run-btn" onclick="benchRun()">▶ 실행</button>
        <button class="btn btn-danger"  id="bench-stop-btn" onclick="benchStop()" disabled>■ 중단</button>
      </div>
      <div class="log-viewer" id="log-bench"></div>
    </div>

    <!-- GPU tab -->
    <div class="panel-section" id="tab-gpu">
      <div class="section-title">GPU 상태</div>
      <div id="gpu-detail-cards"><!-- dynamic --></div>
    </div>

    <!-- Settings tab -->
    <div class="panel-section" id="tab-settings">
      <div class="section-title">연결 설정</div>
      <div>
        <label>LLM 서버 URL (외부 서버 연결)</label>
        <input type="text" id="cfg-server-url" placeholder="http://localhost:8080">
      </div>
      <button class="btn btn-neutral" onclick="cfgSave()">저장</button>

      <div class="section-title" style="margin-top:8px;">채팅 설정</div>
      <div>
        <label>시스템 프롬프트</label>
        <textarea class="cfg" id="cfg-system-prompt" rows="3"></textarea>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <div>
          <label>Temperature</label>
          <input type="number" id="cfg-temperature" step="0.05" min="0" max="2">
        </div>
        <div>
          <label>Max Tokens</label>
          <input type="number" id="cfg-max-tokens" min="1" max="32768">
        </div>
      </div>
      <button class="btn btn-primary" onclick="cfgSave()">저장</button>
    </div>

  </div><!-- /panel-body -->
</div><!-- /control-panel -->

<!-- ═══════════════════════════════════════════════════════════ -->
<script>
// ── Marked.js setup ──────────────────────────────────────────
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, {language: lang}).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true, gfm: true,
});

// ── State ────────────────────────────────────────────────────
let activeConvId = null;
let isStreaming  = false;
let logCursors   = {server: 0, tests: 0, bench: 0};
let panelOpen    = false;
let activeTab    = 'server';
let config       = {};

// ── ANSI color stripping ─────────────────────────────────────
function stripAnsi(s) {
  return s.replace(/\x1B\[[0-9;]*[mGKHF]/g, '');
}

function colorLine(s) {
  const raw = stripAnsi(s);
  if (/PASSED|PASS|✅|ALL CLEAR/.test(raw)) return `<span class="log-line-pass">${escHtml(raw)}</span>`;
  if (/FAILED|FAIL|ERROR|🔴/.test(raw))    return `<span class="log-line-fail">${escHtml(raw)}</span>`;
  if (/WARNING|WARN|⚠/.test(raw))          return `<span class="log-line-warn">${escHtml(raw)}</span>`;
  return escHtml(raw);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── API helpers ───────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {method, headers: {'Content-Type': 'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  return r.json().catch(() => ({}));
}

// ── Config ────────────────────────────────────────────────────
async function loadConfig() {
  config = await api('GET', '/config');
  document.getElementById('cfg-server-url').value    = config.server_url || '';
  document.getElementById('cfg-system-prompt').value = config.system_prompt || '';
  document.getElementById('cfg-temperature').value   = config.temperature || 0.7;
  document.getElementById('cfg-max-tokens').value    = config.max_tokens || 2048;
  document.getElementById('server-url-label').textContent = config.server_url || '';
}

async function cfgSave() {
  const patch = {
    server_url:     document.getElementById('cfg-server-url').value.trim() || null,
    system_prompt:  document.getElementById('cfg-system-prompt').value || null,
    temperature:    parseFloat(document.getElementById('cfg-temperature').value) || null,
    max_tokens:     parseInt(document.getElementById('cfg-max-tokens').value) || null,
  };
  config = await api('PATCH', '/config', patch);
  document.getElementById('server-url-label').textContent = config.server_url || '';
  showToast('설정 저장됨');
}

// ── Models ────────────────────────────────────────────────────
async function loadModels() {
  const data = await api('GET', '/models');
  const sel = document.getElementById('model-select');
  const prev = sel.value;
  sel.innerHTML = '';
  (data.data || []).forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.id;
    sel.appendChild(opt);
  });
  if (prev && sel.querySelector(`option[value="${prev}"]`)) sel.value = prev;
}

// ── Status polling ────────────────────────────────────────────
async function pollStatus() {
  try {
    const s = await api('GET', '/status');
    updateServerDot(s.llm_server_reachable);
    updateGpuBars(s.gpus);
    updateGpuDetail(s.gpus);
    updateProcessBadges(s.processes);
    if (!s.llm_server_reachable) {
      document.getElementById('welcome-server-hint').textContent =
        '⚠ LLM 서버가 오프라인 상태입니다. 서버 제어 패널에서 시작하세요.';
    } else {
      document.getElementById('welcome-server-hint').textContent = '';
    }
  } catch(e) {}
}

function updateServerDot(ok) {
  const dot = document.getElementById('server-dot');
  dot.classList.toggle('up', ok);
  dot.title = ok ? 'LLM 서버 온라인' : 'LLM 서버 오프라인';
}

function updateGpuBars(gpus) {
  const el = document.getElementById('gpu-bars');
  if (!gpus.length) { el.innerHTML = '<span style="font-size:11px;color:var(--text-2)">GPU 없음</span>'; return; }
  el.innerHTML = gpus.map(g => {
    const cls = g.mem_pct > 90 ? 'hot' : g.mem_pct > 70 ? 'warm' : '';
    return `<div class="gpu-mini">
      <span>GPU${g.id}</span>
      <div class="gpu-bar-wrap"><div class="gpu-bar ${cls}" style="width:${g.mem_pct}%"></div></div>
      <span>${g.mem_pct}%</span>
    </div>`;
  }).join('');
}

function updateGpuDetail(gpus) {
  const el = document.getElementById('gpu-detail-cards');
  if (!el) return;
  if (!gpus.length) { el.innerHTML = '<p style="color:var(--text-2);font-size:13px">nvidia-smi 없음 또는 GPU 미감지</p>'; return; }
  el.innerHTML = gpus.map(g => {
    const mc = g.mem_pct > 90 ? 'hot' : g.mem_pct > 70 ? 'warm' : '';
    const uc = g.util_pct > 90 ? 'hot' : g.util_pct > 60 ? 'warm' : '';
    return `<div class="gpu-card">
      <div class="gpu-name">GPU ${g.id} — ${g.name}</div>
      <div class="gpu-stat-row"><span class="gpu-stat-label">VRAM</span><span class="gpu-stat-val">${g.mem_used_mib} / ${g.mem_total_mib} MiB (${g.mem_pct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill ${mc}" style="width:${g.mem_pct}%"></div></div>
      <div class="gpu-stat-row" style="margin-top:6px"><span class="gpu-stat-label">GPU 사용률</span><span class="gpu-stat-val">${g.util_pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill ${uc}" style="width:${g.util_pct}%"></div></div>
      <div class="gpu-stat-row" style="margin-top:6px"><span class="gpu-stat-label">온도</span><span class="gpu-stat-val">${g.temp_c}°C</span></div>
    </div>`;
  }).join('');
}

function updateProcessBadges(procs) {
  const srvBadge = document.getElementById('server-status-badge');
  const srvProc  = procs?.server;
  if (srvProc?.running) {
    srvBadge.className = 'status-badge badge-green';
    srvBadge.textContent = `● 실행 중 (PID ${srvProc.pid})`;
    document.getElementById('srv-start-btn').disabled = true;
    document.getElementById('srv-stop-btn').disabled  = false;
  } else if (srvProc?.exit_code != null) {
    const ok = srvProc.exit_code === 0;
    srvBadge.className = `status-badge ${ok ? 'badge-green' : 'badge-red'}`;
    srvBadge.textContent = `● 종료 (${srvProc.exit_code})`;
    document.getElementById('srv-start-btn').disabled = false;
    document.getElementById('srv-stop-btn').disabled  = true;
  } else {
    srvBadge.className = 'status-badge badge-red';
    srvBadge.textContent = '● 오프라인';
    document.getElementById('srv-start-btn').disabled = false;
    document.getElementById('srv-stop-btn').disabled  = true;
  }

  const updateBadge = (id, proc) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (proc?.running) {
      el.className = 'status-badge badge-yellow'; el.textContent = '● 실행 중';
    } else if (proc?.exit_code === 0) {
      el.className = 'status-badge badge-green';  el.textContent = '● 완료';
    } else if (proc?.exit_code != null && proc.exit_code !== 0) {
      el.className = 'status-badge badge-red';    el.textContent = `● 실패 (${proc.exit_code})`;
    } else {
      el.className = 'status-badge badge-yellow'; el.textContent = '● 대기';
    }
  };
  updateBadge('tests-status-badge', procs?.tests);
  updateBadge('bench-status-badge', procs?.bench);

  if (!procs?.bench?.running) {
    document.getElementById('bench-run-btn').disabled  = false;
    document.getElementById('bench-stop-btn').disabled = true;
  }
}

// ── Log polling ───────────────────────────────────────────────
async function pollLogs() {
  for (const key of ['server', 'tests', 'bench']) {
    const el = document.getElementById(`log-${key}`);
    if (!el) continue;
    try {
      const d = await api('GET', `/logs/${key}?since=${logCursors[key]}`);
      if (d.lines && d.lines.length > 0) {
        d.lines.forEach(line => {
          el.innerHTML += colorLine(line) + '\n';
        });
        logCursors[key] = d.total;
        el.scrollTop = el.scrollHeight;
      }
    } catch(e) {}
  }
}

// ── Conversations ─────────────────────────────────────────────
async function loadConversations() {
  const list = await api('GET', '/conversations');
  const el = document.getElementById('conv-list');
  if (!list.length) { el.innerHTML = '<div style="padding:8px 10px;font-size:12px;color:var(--text-2)">대화 없음</div>'; return; }
  el.innerHTML = list.map(c =>
    `<div class="conv-item ${c.id === activeConvId ? 'active' : ''}" onclick="loadConv('${c.id}')" data-id="${c.id}">
      <span class="conv-title" title="${escHtml(c.title)}">${escHtml(c.title)}</span>
      <button class="del-btn" onclick="event.stopPropagation(); deleteConv('${c.id}')" title="삭제">✕</button>
    </div>`
  ).join('');
}

async function newChat() {
  const conv = await api('POST', '/conversations', {title: '새 대화'});
  activeConvId = conv.id;
  clearMessages();
  await loadConversations();
}

async function loadConv(id) {
  const conv = await api('GET', `/conversations/${id}`);
  activeConvId = id;
  clearMessages();
  const msgs = conv.messages || [];
  if (msgs.length > 0) {
    document.getElementById('welcome').style.display = 'none';
    msgs.forEach(m => appendMessage(m.role, m.content, false));
  }
  await loadConversations();
}

async function deleteConv(id) {
  await api('DELETE', `/conversations/${id}`);
  if (activeConvId === id) { activeConvId = null; clearMessages(); }
  await loadConversations();
}

function clearMessages() {
  const el = document.getElementById('messages');
  el.innerHTML = `<div id="welcome" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;color:var(--text-2);text-align:center;padding:40px;">
    <h2 style="font-size:22px;color:var(--text)">TurboQuant WebUI</h2>
    <p>PolarQuant + QJL KV 캐시 압축 기반 LLM 인터페이스</p>
    <div id="suggestion-chips">
      <span class="chip" onclick="fillPrompt('TurboQuant 알고리즘을 간단히 설명해줘')">TurboQuant란?</span>
      <span class="chip" onclick="fillPrompt('KV 캐시 압축의 장점을 설명해줘')">KV 캐시 압축 장점</span>
      <span class="chip" onclick="fillPrompt('turbo4 vs turbo3 차이점은?')">turbo4 vs turbo3</span>
    </div>
    <p id="welcome-server-hint" style="font-size:12px;color:var(--red);"></p>
  </div>`;
}

// ── Chat ──────────────────────────────────────────────────────
let messages = []; // local buffer for current conversation

function appendMessage(role, content, render = true) {
  const el = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.style.display = 'none';

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div class="msg-content">${render ? marked.parse(content) : marked.parse(content)}</div>
  `;
  el.appendChild(div);
  // syntax highlight
  div.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
  document.getElementById('messages-bottom').scrollIntoView({behavior: 'smooth'});
  return div;
}

async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoResize(input);

  // Ensure we have a conversation
  if (!activeConvId) {
    const conv = await api('POST', '/conversations', {title: text.slice(0, 40)});
    activeConvId = conv.id;
  }

  // Load existing messages from server
  const conv = await api('GET', `/conversations/${activeConvId}`);
  messages = conv.messages || [];

  // Append user message
  messages.push({role: 'user', content: text});
  appendMessage('user', text);
  await api('PATCH', `/conversations/${activeConvId}`, {messages, title: messages[0]?.content?.slice(0,40) || '대화'});
  await loadConversations();

  // Stream assistant response
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('typing-row').style.display = 'flex';
  document.getElementById('typing-indicator').classList.add('visible');

  const model  = document.getElementById('model-select').value || 'model-turbo';
  const payload = {
    model,
    messages: messages.map(m => ({role: m.role, content: m.content})),
    stream: true,
    chat_id: activeConvId,
  };

  let assistantDiv = null;
  let assistantText = '';

  try {
    const resp = await fetch('/api/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });

    document.getElementById('typing-row').style.display = 'none';
    assistantDiv = appendMessage('assistant', '…');

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        try {
          const chunk = JSON.parse(raw);
          if (chunk.error) { assistantText = `**오류:** ${chunk.error.message}`; break; }
          const delta = chunk.choices?.[0]?.delta?.content;
          if (delta) { assistantText += delta; }
        } catch(e) {}
      }
      // Update display every chunk
      if (assistantDiv) {
        assistantDiv.querySelector('.msg-content').innerHTML = marked.parse(assistantText || '…');
        assistantDiv.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
      }
    }
  } catch(e) {
    assistantText = `**오류:** LLM 서버에 연결할 수 없습니다.`;
    if (assistantDiv) assistantDiv.querySelector('.msg-content').innerHTML = marked.parse(assistantText);
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('typing-row').style.display = 'none';
    document.getElementById('typing-indicator').classList.remove('visible');
  }

  // Save assistant response
  if (assistantText) {
    messages.push({role: 'assistant', content: assistantText});
    await api('PATCH', `/conversations/${activeConvId}`, {messages});
    // Final render with highlight
    if (assistantDiv) {
      assistantDiv.querySelector('.msg-content').innerHTML = marked.parse(assistantText);
      assistantDiv.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    }
  }
  document.getElementById('messages-bottom').scrollIntoView({behavior: 'smooth'});
}

// ── Server control ────────────────────────────────────────────
async function serverStart() {
  const r = await api('POST', '/control/server/start', {
    model_path: document.getElementById('srv-model-path').value.trim(),
    cache_type: document.getElementById('srv-cache-type').value,
    ctx_size:   parseInt(document.getElementById('srv-ctx').value),
    port:       parseInt(document.getElementById('srv-port').value),
    ngl:        parseInt(document.getElementById('srv-ngl').value),
  });
  if (!r.ok) showToast(r.error || '서버 시작 실패', true);
  logCursors.server = 0;
}

async function serverStop() {
  const r = await api('POST', '/control/server/stop');
  if (!r.ok) showToast(r.error || '서버 종료 실패', true);
}

// ── Tests ─────────────────────────────────────────────────────
async function testsRun() {
  const r = await api('POST', '/control/tests/run', {
    mode: document.getElementById('test-mode').value,
  });
  if (!r.ok) showToast(r.error || '테스트 시작 실패', true);
  else { logCursors.tests = 0; document.getElementById('log-tests').innerHTML = ''; }
}

// ── Bench ─────────────────────────────────────────────────────
async function benchRun() {
  const r = await api('POST', '/control/bench/run', {
    model_path: document.getElementById('bench-model-path').value.trim(),
    llama_dir:  document.getElementById('bench-llama-dir').value.trim(),
    no_ref:     document.getElementById('bench-no-ref').checked,
  });
  if (r.ok) {
    logCursors.bench = 0;
    document.getElementById('log-bench').innerHTML = '';
    document.getElementById('bench-run-btn').disabled  = true;
    document.getElementById('bench-stop-btn').disabled = false;
  } else showToast(r.error || '벤치 시작 실패', true);
}

async function benchStop() {
  await api('POST', '/control/bench/stop');
}

// ── Panel / tabs ──────────────────────────────────────────────
function openPanel(tab) {
  document.getElementById('control-panel').classList.add('visible');
  document.getElementById('panel-overlay').classList.add('visible');
  panelOpen = true;
  switchTab(tab);
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  const map = {server:'btn-server-panel', tests:'btn-tests-panel', bench:'btn-tests-panel', gpu:'btn-server-panel', settings:'btn-settings-panel'};
  const btn = document.getElementById(map[tab]);
  if (btn) btn.classList.add('active');
}

function closePanel() {
  document.getElementById('control-panel').classList.remove('visible');
  document.getElementById('panel-overlay').classList.remove('visible');
  panelOpen = false;
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.ptab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel-section').forEach(s => s.classList.toggle('active', s.id === `tab-${tab}`));
}

document.querySelectorAll('.ptab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

// ── Misc helpers ──────────────────────────────────────────────
function fillPrompt(text) {
  document.getElementById('user-input').value = text;
  document.getElementById('user-input').focus();
  autoResize(document.getElementById('user-input'));
}

function autoResize(el) {
  el.style.height = '20px';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

function showToast(msg, isError = false) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'24px', right:'24px', zIndex:999,
    background: isError ? 'var(--red)' : 'var(--green)',
    color:'#fff', padding:'10px 16px', borderRadius:'8px',
    fontSize:'13px', fontWeight:'600', boxShadow:'0 2px 8px rgba(0,0,0,0.4)',
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Event wiring ──────────────────────────────────────────────
document.getElementById('new-chat-btn').onclick   = newChat;
document.getElementById('send-btn').onclick        = sendMessage;
document.getElementById('panel-overlay').onclick   = closePanel;
document.getElementById('btn-server-panel').onclick = () =>
  panelOpen && activeTab === 'server' ? closePanel() : openPanel('server');
document.getElementById('btn-tests-panel').onclick  = () =>
  panelOpen && (activeTab === 'tests' || activeTab === 'bench') ? closePanel() : openPanel('tests');
document.getElementById('btn-settings-panel').onclick = () =>
  panelOpen && activeTab === 'settings' ? closePanel() : openPanel('settings');

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('user-input').addEventListener('input', e => autoResize(e.target));

// ── Init & polling ────────────────────────────────────────────
async function init() {
  await loadConfig();
  await loadModels();
  await loadConversations();
  await pollStatus();
  setInterval(pollStatus, 3000);
  setInterval(pollLogs,   1500);
  setInterval(loadModels, 10000);
}

init();
</script>
